# Arch Gaming OS — Hyprland 0.55+ configuration

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Breeze_Snow
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1

# NOTE: LIBGL_ALWAYS_SOFTWARE / WLR_NO_HARDWARE_CURSORS are set in ~/.profile
# only when running inside a VM (vmware/oracle/qemu/kvm). Do NOT enable them
# here globally or hardware acceleration will be disabled on real AMD GPUs.

exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = mako
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent
exec-once = nm-applet
exec-once = blueman-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

monitor = ,preferred,auto,1

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgb(f59e0b)
    col.inactive_border = rgb(444444)
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 0, 10, default
    animation = workspaces, 1, 6, default
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    disable_splash_rendering = false
    enable_swallow = true
    swallow_regex = ^(kitty)$
    vrr = 1
}

render {
    direct_scanout = 0
}

# — Keybinds —

$mainMod = SUPER

bind = $mainMod, Q, exec, kitty
bind = $mainMod, Return, exec, kitty
bind = $mainMod, Space, exec, wofi --show drun
bind = $mainMod, D, exec, wofi --show drun
bind = $mainMod, C, killactive
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod SHIFT, E, exec, wlogout
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, V, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod SHIFT, W, exec, ~/.local/bin/wallpaper-switch

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod ALT, left, resizeactive, -30 0
bind = $mainMod ALT, right, resizeactive, 30 0
bind = $mainMod ALT, up, resizeactive, 0 -30
bind = $mainMod ALT, down, resizeactive, 0 30

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy && wl-paste | swappy -f -

# Media keys
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Mouse binds
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# — Window Rules —

windowrule = float 1, match:class ^(pavucontrol)$
windowrule = float 1, match:class ^(blueman-manager)$
windowrule = float 1, match:title ^(Picture-in-Picture)$
windowrule = float 1, match:class ^(nm-connection-editor)$
windowrule = float 1, match:class ^(polkit-gnome-authentication-agent-1)$
windowrule = float 1, match:class ^(qt6ct)$
windowrule = float 1, match:class ^(nwg-look)$
windowrule = size 800 600, match:class ^(pavucontrol)$
windowrule = size 800 600, match:class ^(blueman-manager)$
windowrule = opacity 0.9, match:class ^(kitty)$

# Idle inhibit for gaming
windowrule = idle_inhibit focus, match:class ^(steam)$
windowrule = idle_inhibit focus, match:class ^(.*.exe)$
windowrule = idle_inhibit focus, match:class ^(heroic)$
windowrule = idle_inhibit fullscreen, match:class ^(.*)$

# — Layer Rules —
layerrule = blur on, match:namespace wofi
layerrule = ignore_alpha 1, match:namespace wofi
