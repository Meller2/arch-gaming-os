general {
    grace = 5
    no_fade_in = false
    disable_loading_bar = false
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(f59e0b)
    inner_color = rgb(1a1a1a)
    font_color = rgb(ffffff)
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = <span foreground="##f59e0b"><b>Enter Password</b></span>
    hide_input = false
    rounding = -1
    check_color = rgb(f59e0b)
    fail_color = rgb(ff3333)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgb(ffcc00)
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgba(ffffff, 0.9)
    font_size = 72
    font_family = Noto Sans
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:18000000] echo "$(date '+%A, %d %B %Y')"
    color = rgba(f59e0b, 0.9)
    font_size = 18
    font_family = Noto Sans
    position = 0, 140
    halign = center
    valign = center
}
