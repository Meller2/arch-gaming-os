name: Build Arch Gaming ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Initialize Pacman and Install Dependencies
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            git archiso arch-install-scripts tar gzip \
            grub syslinux dos2unix

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Convert Line Endings to LF
        run: |
          find . -type f \( -name '*.sh' -o -name '*.conf' \
            -o -name '*.jsonc' -o -name '*.json' \
            -o -name '*.desktop' -o -name '*.cfg' \
            -o -name '*.txt' -o -name '*.toml' \
            -o -name '*.lua' -o -name '*.css' \) \
            -exec dos2unix {} +
          dos2unix ./airootfs/etc/skel/.local/bin/wallpaper-switch 2>/dev/null || true
          dos2unix ./airootfs/etc/skel/.profile 2>/dev/null || true
          chmod +x build.sh

      - name: Build ISO
        run: |
          ./build.sh --clean

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Arch-Gaming-ISO
          path: out/*.iso
          if-no-files-found: error
          retention-days: 7
